name: publish-social
on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Print what would publish, change nothing"
        type: boolean
        default: false
concurrency:
  group: publish-social
  cancel-in-progress: false
permissions:
  contents: write
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Publish due posts
        env:
          COMPOSIO_API_KEY: ${{ secrets.COMPOSIO_API_KEY }}
        run: |
          python publisher/publish.py ${{ inputs.dry_run == true && '--dry-run' || '' }}
      - name: Commit state changes
        if: ${{ inputs.dry_run != true }}
        run: |
          git config user.name "social-publisher-bot"
          git config user.email "actions@users.noreply.github.com"
          git add queue published
          git diff --cached --quiet || git commit -m "chore: publish run $(date -u +%FT%TZ)"
          git push
